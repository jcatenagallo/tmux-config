# ── Prefix: Ctrl+b → Ctrl+Space ──────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Al matar la sesión actual, saltar a otra en vez de salir de tmux
set -g detach-on-destroy off

# Numerar ventanas y paneles desde 1
set -g base-index 1
setw -g pane-base-index 1

# Re-enumerar las ventanas automáticamente al cerrar una (sin huecos)
set -g renumber-windows on

# ── Splits ───────────────────────────────────────────────────
# Split vertical (paneles lado a lado): '
unbind "'"
bind "'" split-window -h

# ── Path base por sesión ─────────────────────────────────────
# Cada sesión "recuerda" el directorio donde nació (@base_path)...
set-hook -g session-created 'set-option @base_path "#{pane_current_path}"'
# ...y las ventanas nuevas (prefix + c) nacen siempre desde ahí.
# Fallback: si @base_path no está seteada, usa el directorio del panel actual.
bind c new-window -c "#{?@base_path,#{@base_path},#{pane_current_path}}"

# ── Recargar config: r ───────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display-message "config recargada ✓"

# ── Moverse entre paneles con hjkl ───────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Navegar entre ventanas con { y } ─────────────────────────
bind "{" previous-window
bind "}" next-window

# ── Nota rápida en juanvault: n ──────────────────────────────
# Popup flotante (desde cualquier ventana/sesión) que pide el título
# y abre la nota nueva en nvim, dentro del juanvault.
bind n display-popup -w 80% -h 80% -E "~/.config/tmux/scripts/juanvault-note.sh"

# ── Plugins (todos vía TPM) ──────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'jcatenagallo/tmux-claude-nav'   # barra + navegación de sesiones de Claude

# Options to make tmux more pleasant
set -g mouse on
set -g default-terminal "tmux-256color"

# ── Configuración catppuccin ─────────────────────────────────
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Mostrar el NOMBRE de la ventana (#W) en vez del pane title (#T).
# Por defecto catppuccin usa #T, que refleja el título que escribe la app
# (p. ej. Claude Code). Con #W se muestra el nombre real de la ventana,
# el que controlás con prefix + , (rename-window).
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# ── Status line ──────────────────────────────────────────────
set -g status-right-length 100
set -gF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
# La barra de sesiones de Claude (status-left, su largo y el status-interval)
# la configura el plugin tmux-claude-nav al cargar.

# ── Resurrect / Continuum ────────────────────────────────────
set -g @continuum-restore 'on'        # restaurar sesiones automáticamente al arrancar tmux
set -g @continuum-save-interval '15'  # guardar cada 15 min

# ── SessionX ─────────────────────────────────────────────────
set -g @sessionx-bind 'o'             # prefix + o para abrir el selector
set -g @sessionx-zoxide-mode 'on'     # matching de paths con zoxide
set -g @sessionx-preview-enabled 'true'
set -g @sessionx-filter-current 'false'  # mostrar también la sesión actual en la lista

# ── tmux-claude-nav ──────────────────────────────────────────
# prefix + número salta al panel de Claude N; prefix + g + número → ventana N.
set -g @claude_nav_jump_key 'direct'
set -g @claude_nav_position 'left'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
